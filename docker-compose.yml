version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tutorial_db
    restart: always
    environment:
      POSTGRES_DB: tutorial_arena
      POSTGRES_USER: tutorial_user
      POSTGRES_PASSWORD: tutorial_password
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tutorial_backend
    restart: always
    ports:
      - "5005:5000"
    environment:
      - PORT=5000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=tutorial_arena
      - DB_USER=tutorial_user
      - DB_PASSWORD=tutorial_password
      - JWT_SECRET=super_secret_jwt_key_123!
      - RESEND_API_KEY=re_RUmwx1Uq_Fj8skSyvA7pnMPvEqtsWyD6U
      - MAIL_FROM=Creators Tutorial Arena <onboarding@resend.dev>
      - FRONTEND_URL=http://localhost:5175
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tutorial_frontend
    ports:
      - "5175:5173"
    environment:
      - VITE_API_URL=http://localhost:5005/api
    depends_on:
      - backend

volumes:
  pgdata:
